# render.yaml — E-Questões Backend (Render Deploy)

services:
  - type: web
    name: e-questoes-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: e-questoes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://e-questoes-frontend.onrender.com

databases:
  - name: e-questoes-db
    databaseName: equestoes
    region: oregon
    plan: free
    ipAllowList: []
