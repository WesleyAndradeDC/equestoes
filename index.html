<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Favicons ─────────────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- ── Viewport ─────────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Metadados básicos ─────────────────────────────────────────────── -->
    <title>G-Concursos - Plataforma de Estudos Gramatique</title>
    <meta name="description" content="G-Concursos - Sua plataforma completa para estudos de gramática e preparação para concursos" />
    <meta name="theme-color" content="#8F39D8" />

    <!-- ── PWA: iOS / Safari ─────────────────────────────────────────────── -->
    <!-- Habilita modo standalone no Safari (Remove barra de endereço ao abrir da home) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Estilo da status bar no iOS: default (branco), black ou black-translucent -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Nome do app na tela inicial do iOS -->
    <meta name="apple-mobile-web-app-title" content="G-Concursos" />
    <!-- Ícone para "Adicionar à tela inicial" no iOS -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- ── PWA: Android / Chrome ─────────────────────────────────────────── -->
    <!-- O manifest é injetado automaticamente pelo vite-plugin-pwa no build -->

    <!-- ── PWA: Microsoft Tiles (opcional, para compatibilidade ampla) ───── -->
    <meta name="msapplication-TileColor" content="#8F39D8" />
    
    <!-- Montserrat Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
